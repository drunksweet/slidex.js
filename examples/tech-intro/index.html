<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>tang-slidex — AI 驱动的幻灯片框架</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <!-- highlight.js：代码语法高亮，slide 内直接用 <pre><code class="language-xxx"> 即可 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* ─── Slide 舞台 ─── */
    #slide-host {
      width: 1280px; height: 720px;
      position: relative;
      transform-origin: center center;
      transition: opacity 0.15s ease;
    }
    #slide-host.tang-edit-mode {
      outline: 2px solid rgba(251, 146, 60, 0.5);
      outline-offset: 3px;
    }

    /* ─── 编辑提示横幅 ─── */
    #edit-banner {
      position: fixed; top: 0; left: 0; right: 0;
      height: 36px;
      background: linear-gradient(90deg, #f97316, #ea580c);
      color: #fff; font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      z-index: 300; letter-spacing: 0.02em;
      transform: translateY(-100%);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #edit-banner.show { transform: translateY(0); }
    #edit-banner kbd {
      background: rgba(0,0,0,0.25); padding: 1px 6px; border-radius: 4px;
      font-size: 11px; font-family: ui-monospace; letter-spacing: 0;
    }
    #edit-banner .banner-sep { opacity: 0.4; }

    /* ─── 导航栏 ─── */
    #nav-bar {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      background: rgba(15,15,25,0.85);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; padding: 6px 14px;
      color: #fff; font-size: 13px;
      user-select: none; z-index: 50;
      transition: border-color 0.3s, background 0.3s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    #nav-bar.edit-mode {
      border-color: rgba(251, 146, 60, 0.45);
      background: rgba(30,15,5,0.9);
    }
    .nav-btn {
      background: none; border: none; color: rgba(255,255,255,0.65);
      cursor: pointer; font-size: 15px; padding: 4px 10px;
      border-radius: 6px; transition: all 0.15s; line-height: 1;
      white-space: nowrap;
    }
    .nav-btn:hover  { background: rgba(255,255,255,0.09); color: #fff; }
    .nav-btn:active { transform: scale(0.91); }
    .nav-btn:disabled { opacity: 0.22; cursor: not-allowed; }
    .nav-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.12); margin: 0 2px; }
    #page-info { color: rgba(255,255,255,0.5); min-width: 52px; text-align: center; font-size: 12px; }
    #btn-edit { color: #fb923c; font-size: 13px; padding: 4px 12px; }
    #btn-edit:hover { background: rgba(251,146,60,0.12); color: #fdba74; }
    #btn-save { font-size: 12px; padding: 4px 12px; background: rgba(34,197,94,0.14); color: #4ade80; border-radius: 6px; }
    #btn-save:hover { background: rgba(34,197,94,0.24); }
    #btn-cancel-edit { font-size: 12px; padding: 4px 10px; color: rgba(255,255,255,0.45); }

    /* ─── HMR / status toast ─── */
    #hmr-toast {
      position: fixed; bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #7c3aed; color: #fff;
      font-size: 12px; font-weight: 600;
      padding: 7px 18px; border-radius: 999px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.18s, transform 0.18s; z-index: 60;
      white-space: nowrap;
    }
    #hmr-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── 加载遮罩 ─── */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0f; color: rgba(255,255,255,0.4);
      font-size: 16px; transition: opacity 0.3s; z-index: 100;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    /* ═══════════════════════════════════════════════════════
       编辑模式：元素状态
    ═══════════════════════════════════════════════════════ */
    .tang-editable {
      outline: 1px dashed rgba(99,179,237,0.35) !important;
      cursor: text !important;
      border-radius: 2px;
    }
    .tang-editable:focus {
      outline: 2px solid rgba(99,179,237,0.8) !important;
      background: rgba(59,130,246,0.05) !important;
    }
    .tang-draggable { cursor: grab !important; }
    .tang-dragging  { cursor: grabbing !important; opacity: 0.82; z-index: 999; }

    /* 代码块 hover 提示 */
    .tang-edit-mode pre { position: relative !important; cursor: text; }
    .tang-edit-mode pre:hover { outline: 1px dashed rgba(99,179,237,0.5); }
    .tang-edit-mode pre:hover::after {
      content: 'click to edit'; position: absolute; top: 6px; right: 8px;
      background: rgba(59,130,246,0.85); color: #fff;
      font-size: 10px; font-family: system-ui; font-weight: 600;
      padding: 2px 7px; border-radius: 3px; pointer-events: none;
    }

    /* ─── 选中框 ─── */
    #selection-overlay {
      position: fixed;
      border: 2px solid #3b82f6;
      border-radius: 4px;
      pointer-events: none;
      z-index: 400;
      display: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
      transition: left .08s, top .08s, width .08s, height .08s;
    }
    #selection-overlay::before {
      content: attr(data-label);
      position: absolute; top: -21px; left: -2px;
      background: #3b82f6; color: #fff;
      font-size: 10px; font-weight: 700; font-family: ui-monospace;
      padding: 1px 7px; border-radius: 4px 4px 0 0;
      white-space: nowrap; pointer-events: none;
      letter-spacing: 0.02em;
    }

    /* ─── 对齐辅助线 ─── */
    .tang-align-guide {
      position: fixed; background: rgba(251,146,60,0.7);
      pointer-events: none; z-index: 410; display: none;
    }
    #align-h { height: 1px; left: 0; right: 0; }
    #align-v { width: 1px; top: 0; bottom: 0; }

    /* ═══════════════════════════════════════════════════════
       浮动工具栏（选中元素时出现）
    ═══════════════════════════════════════════════════════ */
    #edit-toolbar {
      position: fixed;
      display: none;
      align-items: center; gap: 2px;
      background: rgba(15,15,25,0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 5px 8px;
      z-index: 450;
      box-shadow: 0 6px 28px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.05);
      transform-origin: top center;
      animation: toolbar-pop 0.14s cubic-bezier(0.34,1.56,0.64,1);
    }
    #edit-toolbar.visible { display: flex; }
    @keyframes toolbar-pop {
      from { opacity: 0; transform: scale(0.9) translateY(-6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .tb-btn {
      background: none; border: none; color: rgba(255,255,255,0.7);
      cursor: pointer; font-size: 13px; padding: 4px 7px;
      border-radius: 6px; transition: all 0.12s; line-height: 1;
      white-space: nowrap; display: flex; align-items: center; gap: 3px;
    }
    .tb-btn:hover  { background: rgba(255,255,255,0.1); color: #fff; }
    .tb-btn:active { transform: scale(0.9); }
    .tb-btn.active { background: rgba(99,179,237,0.18); color: #93c5fd; }
    .tb-btn.danger:hover { background: rgba(239,68,68,0.18); color: #fca5a5; }

    .tb-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.1); margin: 0 3px; flex-shrink: 0; }

    .tb-input {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; border-radius: 5px; font-size: 12px;
      padding: 3px 6px; outline: none; text-align: center;
    }
    .tb-input:focus { border-color: rgba(99,179,237,0.6); background: rgba(99,179,237,0.08); }
    #tb-font-size { width: 44px; }

    .tb-color-btn {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      cursor: pointer; padding: 0; position: relative; overflow: hidden;
      transition: border-color 0.15s;
    }
    .tb-color-btn:hover { border-color: rgba(255,255,255,0.6); }
    .tb-color-btn input[type="color"] {
      position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px);
      opacity: 0; cursor: pointer; border: none; padding: 0;
    }
    .tb-color-preview {
      width: 100%; height: 100%;
      border-radius: 50%;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════════
       属性侧边栏（选中元素时显示）
    ═══════════════════════════════════════════════════════ */
    #props-panel {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 220px;
      background: rgba(10,10,20,0.92);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255,255,255,0.08);
      padding: 16px 14px;
      overflow-y: auto;
      z-index: 300;
      transform: translateX(100%);
      transition: transform 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
      display: flex; flex-direction: column; gap: 16px;
    }
    #props-panel.visible { transform: translateX(0); }

    .pp-section { display: flex; flex-direction: column; gap: 8px; }
    .pp-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3); text-transform: uppercase; padding-bottom: 2px;
    }
    .pp-row { display: flex; align-items: center; gap: 6px; }
    .pp-label { font-size: 11px; color: rgba(255,255,255,0.45); width: 52px; flex-shrink: 0; }
    .pp-input {
      flex: 1; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1); color: #fff;
      border-radius: 5px; font-size: 12px; padding: 4px 7px;
      outline: none; min-width: 0;
    }
    .pp-input:focus { border-color: rgba(99,179,237,0.55); background: rgba(99,179,237,0.07); }
    .pp-range {
      flex: 1; accent-color: #3b82f6; cursor: pointer;
      height: 3px;
    }
    .pp-color-row { display: flex; align-items: center; gap: 6px; }
    .pp-color-swatch {
      width: 28px; height: 28px; border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer; position: relative; overflow: hidden;
      flex-shrink: 0;
    }
    .pp-color-swatch input[type="color"] {
      position: absolute; inset: -4px; opacity: 0; cursor: pointer;
      width: calc(100% + 8px); height: calc(100% + 8px);
    }
    .pp-color-hex {
      flex: 1; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1); color: #fff;
      border-radius: 5px; font-size: 11px; font-family: ui-monospace;
      padding: 4px 7px; outline: none; min-width: 0;
      text-transform: uppercase;
    }
    .pp-color-hex:focus { border-color: rgba(99,179,237,0.55); }
    .pp-btn-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .pp-icon-btn {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.65); border-radius: 6px; padding: 4px 8px;
      cursor: pointer; font-size: 11px; transition: all 0.12s;
      flex: 1; text-align: center; min-width: 0;
    }
    .pp-icon-btn:hover { background: rgba(99,179,237,0.15); color: #93c5fd; border-color: rgba(99,179,237,0.3); }
    .pp-icon-btn.active { background: rgba(99,179,237,0.2); color: #93c5fd; border-color: rgba(99,179,237,0.4); }

    .pp-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 2px 0; }
    #pp-no-selection {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      opacity: 0.35; padding: 20px;
    }
    #pp-no-selection .pp-empty-icon { font-size: 28px; }
    #pp-no-selection .pp-empty-text { font-size: 11px; text-align: center; color: rgba(255,255,255,0.6); line-height: 1.5; }

    /* ─── 代码块 textarea ─── */
    .tang-code-textarea {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace !important;
    }
  </style>
</head>
<body>
  <div id="loading">⏳ 加载中…</div>

  <!-- 编辑模式顶部提示横幅 -->
  <div id="edit-banner">
    <span>✏️ 编辑模式</span>
    <span class="banner-sep">·</span>
    <span>点击选中元素</span>
    <span class="banner-sep">·</span>
    <span>拖拽移动</span>
    <span class="banner-sep">·</span>
    <kbd>Esc</kbd>取消
    <kbd>Ctrl+S</kbd>保存
    <kbd>Ctrl+Z</kbd>撤销
  </div>

  <!-- slide 舞台 -->
  <div id="slide-host"></div>
  <div id="hmr-toast">🔥 slide 已热更新</div>

  <!-- 元素选中框（pointer-events:none，浮在上层） -->
  <div id="selection-overlay" data-label=""></div>

  <!-- 对齐辅助线 -->
  <div id="align-h" class="tang-align-guide"></div>
  <div id="align-v" class="tang-align-guide"></div>

  <!-- ══════════════════════════════════════════
       浮动工具栏（选中元素后显示在其正上方）
  ══════════════════════════════════════════ -->
  <div id="edit-toolbar">
    <!-- 文字样式 -->
    <button class="tb-btn" id="tb-bold"   title="粗体 (Ctrl+B)"><b>B</b></button>
    <button class="tb-btn" id="tb-italic" title="斜体 (Ctrl+I)"><i>I</i></button>
    <button class="tb-btn" id="tb-underline" title="下划线"><u>U</u></button>
    <div class="tb-sep"></div>
    <!-- 字号 -->
    <input class="tb-input" id="tb-font-size" type="number" min="6" max="200" step="1" title="字号" placeholder="px">
    <div class="tb-sep"></div>
    <!-- 文字颜色 -->
    <div class="tb-color-btn" title="文字颜色">
      <div class="tb-color-preview" id="tb-color-preview" style="background:#ffffff"></div>
      <input type="color" id="tb-color-input" value="#ffffff">
    </div>
    <div class="tb-sep"></div>
    <!-- 文字对齐 -->
    <button class="tb-btn" id="tb-align-left"   title="左对齐">⬅</button>
    <button class="tb-btn" id="tb-align-center" title="居中对齐">☰</button>
    <button class="tb-btn" id="tb-align-right"  title="右对齐">➡</button>
    <div class="tb-sep"></div>
    <!-- 元素操作 -->
    <button class="tb-btn" id="tb-bring-front" title="置于顶层">↑</button>
    <button class="tb-btn danger" id="tb-delete" title="删除元素">🗑</button>
  </div>

  <!-- ══════════════════════════════════════════
       属性面板（右侧固定，选中元素后滑入）
  ══════════════════════════════════════════ -->
  <div id="props-panel">
    <div id="pp-no-selection">
      <div class="pp-empty-icon">🖱️</div>
      <div class="pp-empty-text">在编辑模式下<br>点击元素以查看属性</div>
    </div>

    <div id="pp-content" style="display:none;flex-direction:column;gap:14px;">

      <!-- 元素信息 -->
      <div class="pp-section">
        <div class="pp-title" id="pp-element-label">元素</div>
      </div>

      <div class="pp-divider"></div>

      <!-- 位移（translate） -->
      <div class="pp-section">
        <div class="pp-title">位置偏移</div>
        <div class="pp-row">
          <span class="pp-label">X 偏移</span>
          <input class="pp-input" id="pp-x" type="number" step="1" placeholder="0">
        </div>
        <div class="pp-row">
          <span class="pp-label">Y 偏移</span>
          <input class="pp-input" id="pp-y" type="number" step="1" placeholder="0">
        </div>
      </div>

      <div class="pp-divider"></div>

      <!-- 不透明度 -->
      <div class="pp-section">
        <div class="pp-title">不透明度</div>
        <div class="pp-row">
          <input class="pp-range" id="pp-opacity-range" type="range" min="0" max="1" step="0.01" value="1">
          <input class="pp-input" id="pp-opacity-val" type="number" min="0" max="100" step="1" style="width:52px;flex:none" value="100">
        </div>
      </div>

      <div class="pp-divider"></div>

      <!-- 背景色 -->
      <div class="pp-section">
        <div class="pp-title">背景色</div>
        <div class="pp-color-row">
          <div class="pp-color-swatch" id="pp-bg-swatch">
            <input type="color" id="pp-bg-input">
          </div>
          <input class="pp-color-hex" id="pp-bg-hex" type="text" placeholder="#000000" maxlength="9">
        </div>
      </div>

      <div class="pp-divider"></div>

      <!-- 圆角 -->
      <div class="pp-section">
        <div class="pp-title">圆角</div>
        <div class="pp-row">
          <input class="pp-range" id="pp-radius-range" type="range" min="0" max="80" step="1" value="0">
          <input class="pp-input" id="pp-radius-val"  type="number" min="0" max="80" step="1" style="width:52px;flex:none" value="0">
        </div>
      </div>

      <div class="pp-divider"></div>

      <!-- 对齐（相对 slide） -->
      <div class="pp-section">
        <div class="pp-title">对齐</div>
        <div class="pp-btn-row">
          <button class="pp-icon-btn" id="pp-align-left"    title="水平靠左">← 左</button>
          <button class="pp-icon-btn" id="pp-align-hcenter" title="水平居中">↔ 中</button>
          <button class="pp-icon-btn" id="pp-align-right"   title="水平靠右">→ 右</button>
        </div>
        <div class="pp-btn-row">
          <button class="pp-icon-btn" id="pp-align-top"     title="垂直靠顶">↑ 顶</button>
          <button class="pp-icon-btn" id="pp-align-vcenter" title="垂直居中">↕ 中</button>
          <button class="pp-icon-btn" id="pp-align-bottom"  title="垂直靠底">↓ 底</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════════
       导航栏
  ══════════════════════════════════════════ -->
  <div id="nav-bar">
    <button class="nav-btn" id="btn-prev" title="上一页 (←)">‹</button>
    <span id="page-info">1 / 16</span>
    <button class="nav-btn" id="btn-next" title="下一页 (→)">›</button>
    <div class="nav-divider"></div>
    <button class="nav-btn" id="btn-edit" title="进入编辑模式 (E)">✏️ 编辑</button>
    <button class="nav-btn" id="btn-save"        title="保存 (Ctrl+S)" style="display:none">💾 保存</button>
    <button class="nav-btn" id="btn-cancel-edit" title="取消 (Esc)"    style="display:none">✕ 取消</button>
  </div>

  <script type="module">
    // ═══════════════════════════════════════════════════════════════
    // 主题 & 配置
    // ═══════════════════════════════════════════════════════════════
    const THEME = {
      colors: {
        primary: '#7c3aed', secondary: '#5b21b6',
        background: '#0f172a', surface: '#1e293b',
        text: '#f1f5f9', textMuted: '#94a3b8',
        accent: '#1e1b4b', border: '#334155',
      },
      fonts: { heading: 'system-ui', body: 'system-ui', mono: 'ui-monospace' },
      borderRadius: '12px',
      shadow: '0 4px 32px rgba(124,58,237,0.15)',
    }

    function buildThemeCss(t) {
      return `#slide-host {
        --color-primary:    ${t.colors.primary};
        --color-secondary:  ${t.colors.secondary};
        --color-background: ${t.colors.background};
        --color-surface:    ${t.colors.surface};
        --color-text:       ${t.colors.text};
        --color-text-muted: ${t.colors.textMuted};
        --color-accent:     ${t.colors.accent};
        --color-border:     ${t.colors.border};
        --font-heading:     ${t.fonts.heading}, system-ui, sans-serif;
        --font-body:        ${t.fonts.body}, system-ui, sans-serif;
        --font-mono:        ${t.fonts.mono}, ui-monospace, monospace;
        --border-radius:    ${t.borderRadius};
        --shadow:           ${t.shadow};
      }`
    }

    const themeStyleEl = document.createElement('style')
    themeStyleEl.id = 'tang-theme'
    themeStyleEl.textContent = buildThemeCss(THEME)
    document.head.appendChild(themeStyleEl)

    const CONFIG = { slidesDir: './slides', totalSlides: 16 }
    let current     = 0
    let isAnimating = false
    const slideStage = document.getElementById('slide-host')

    // ─── 缩放适配 ────────────────────────────────────────────────────
    let currentScale = 1
    function scaleToFit() {
      currentScale = Math.min(window.innerWidth / 1280, window.innerHeight / 720) * 0.96
      slideStage.style.transform = `scale(${currentScale})`
    }
    scaleToFit()
    window.addEventListener('resize', () => { scaleToFit() })

    // ─── Slide 加载 & 渲染 ───────────────────────────────────────────
    async function loadSlide(index) {
      const num = String(index + 1).padStart(3, '0')
      const res = await fetch(`${CONFIG.slidesDir}/slide-${num}.html?t=${Date.now()}`)
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      return res.text()
    }

    function injectSlide(html) {
      const parser = new DOMParser()
      const doc    = parser.parseFromString(html, 'text/html')
      slideStage.innerHTML = ''
      doc.head.querySelectorAll('style').forEach(s => {
        const el = document.createElement('style')
        el.textContent = s.textContent
        slideStage.appendChild(el)
      })
      const scripts = []
      Array.from(doc.body.childNodes).forEach(node => {
        if (node.nodeName === 'SCRIPT') scripts.push(node.textContent || '')
        else slideStage.appendChild(document.importNode(node, true))
      })
      return scripts
    }

    function runScripts(scripts) {
      for (const code of scripts) {
        if (!code.trim()) continue
        try { new Function(code)() } catch (e) { console.warn('[slide script]', e) }
      }
    }

    async function navigateTo(index, { instant = false, hmrReload = false } = {}) {
      if (isAnimating && !instant && !hmrReload) return
      if (index < 0 || index >= CONFIG.totalSlides) return
      // 编辑模式下不允许切页
      if (editManager.active && !hmrReload) return

      isAnimating = true
      try {
        codeBoxManager.destroy()  // 清理上一页的 CodeMirror 实例
        const html    = await loadSlide(index)
        const scripts = injectSlide(html)
        requestAnimationFrame(() => {
          runScripts(scripts)
          // 高亮 viewer 模式代码块
          if (typeof hljs !== 'undefined') {
            slideStage.querySelectorAll('pre code[class*="language-"]').forEach(el => {
              if (!el.dataset.highlighted) hljs.highlightElement(el)
            })
          }
          // 初始化 IDE 模式代码块
          codeBoxManager.init()
        })
        current = index
        updateUI()
        if (!hmrReload) history.replaceState(null, '', `#${index}`)
        // 切页后如果编辑模式激活，重新绑定
        if (editManager.active) requestAnimationFrame(() => editManager.rebind())
      } catch (err) {
        console.error(err)
        slideStage.innerHTML = `<div style="color:#ef4444;padding:48px;font-family:monospace;width:1280px">❌ ${err.message}</div>`
      } finally {
        isAnimating = false
      }
    }

    function updateUI() {
      document.getElementById('page-info').textContent = `${current + 1} / ${CONFIG.totalSlides}`
      const inEdit = editManager.active
      document.getElementById('btn-prev').disabled = current === 0 || inEdit
      document.getElementById('btn-next').disabled = current === CONFIG.totalSlides - 1 || inEdit
    }

    // ═══════════════════════════════════════════════════════════════
    //  EditManager — 来自 @tang-slidex/editor（独立包）
    // Vite dev 模式直接解析 TypeScript 源码
    // ═══════════════════════════════════════════════════════════════
    const { EditManager } = await import('../../packages/editor/src/index.ts')

    // toast 工具（供 EditManager 回调）
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('hmr-toast')
      const colors = { success: '#22c55e', error: '#ef4444', info: '#7c3aed' }
      toast.textContent = msg
      toast.style.background = colors[type] ?? colors.info
      toast.classList.add('show')
      setTimeout(() => {
        toast.classList.remove('show')
        toast.textContent = '🔥 slide 已热更新'
        toast.style.background = ''
      }, 2500)
    }

    const editManager = new EditManager({
      slideStage,
      getCurrentIndex: () => current,
      getCurrentScale: () => currentScale,
      showToast,
      onStateChange: (active) => {
        // 同步 UI 状态（banner、导航栏按钮）
        const banner  = document.getElementById('edit-banner')
        const navBar  = document.getElementById('nav-bar')
        const btnEdit = document.getElementById('btn-edit')
        const btnSave = document.getElementById('btn-save')
        const btnCancel = document.getElementById('btn-cancel-edit')
        if (active) {
          banner.classList.add('show')
          navBar.classList.add('edit-mode')
          btnEdit.style.display   = 'none'
          btnSave.style.display   = ''
          btnCancel.style.display = ''
          propsPanel.open()
        } else {
          banner.classList.remove('show')
          navBar.classList.remove('edit-mode')
          btnEdit.style.display   = ''
          btnSave.style.display   = 'none'
          btnCancel.style.display = 'none'
          propsPanel.close()
          editUI.clearSelection()
        }
        updateUI()
      },
      // 拖拽时同步更新 overlay 和辅助线
      onDragMove: (el) => { editUI.updateOverlay(el); editUI.showGuides(el) },
      onDragEnd:  ()   => { editUI.hideGuides() },
      // 元素被点击后选中
      onElementClick: (el) => { editUI.select(el) },
    })

    // ═══════════════════════════════════════════════════════════════
    //  EditUI — 选中框 / 工具栏 / 属性面板（宿主层，不进 editor 包）
    // ═══════════════════════════════════════════════════════════════
    const editUI = new class EditUI {
      constructor() {
        this._sel = null  // 当前选中元素

        // DOM refs
        this.$overlay  = document.getElementById('selection-overlay')
        this.$toolbar  = document.getElementById('edit-toolbar')
        this.$alignH   = document.getElementById('align-h')
        this.$alignV   = document.getElementById('align-v')

        // ── 工具栏绑定 ──
        this._bindToolbar()

        // ── slide 点击选中 ──
        slideStage.addEventListener('mousedown', (e) => {
          if (!editManager.active) return
          const target = e.target
          // 忽略工具栏本身的点击
          if (this.$toolbar.contains(target)) return
          requestAnimationFrame(() => {
            const slide = slideStage.querySelector('.slide')
            if (!slide) return
            let el = target
            // 向上找到 slide 直接子元素
            while (el && el.parentElement !== slide) {
              el = el.parentElement
              if (!el || el === slideStage) { this.clearSelection(); return }
            }
            if (el && el !== slide) this.select(el)
          })
        })

        // 点击 overlay 之外 → 取消选中
        document.addEventListener('mousedown', (e) => {
          if (!editManager.active) return
          if (
            !slideStage.contains(e.target) &&
            !this.$toolbar.contains(e.target) &&
            !document.getElementById('props-panel').contains(e.target)
          ) {
            this.clearSelection()
          }
        })
      }

      /** 选中一个块元素 */
      select(el) {
        this._sel = el
        this.updateOverlay(el)
        this._showToolbar(el)
        propsPanel.update(el)
      }

      /** 清空选中 */
      clearSelection() {
        this._sel = null
        this.$overlay.style.display = 'none'
        this.$toolbar.classList.remove('visible')
        propsPanel.clear()
      }

      /** 更新蓝色选中框位置 */
      updateOverlay(el) {
        const rect = el.getBoundingClientRect()
        this.$overlay.style.cssText = `
          display: block;
          left:   ${rect.left   - 2}px;
          top:    ${rect.top    - 2}px;
          width:  ${rect.width  + 4}px;
          height: ${rect.height + 4}px;
        `
        const tag = el.tagName.toLowerCase()
        const cls = el.className?.split(' ').find(c => c && !c.startsWith('tang-')) ?? ''
        this.$overlay.dataset.label = cls ? `${tag}.${cls}` : tag
      }

      /** 显示辅助线（拖拽中调用） */
      showGuides(el) {
        const rect     = el.getBoundingClientRect()
        const hostRect = slideStage.getBoundingClientRect()
        const cx = rect.left + rect.width  / 2
        const cy = rect.top  + rect.height / 2
        const hx = hostRect.left + hostRect.width  / 2
        const hy = hostRect.top  + hostRect.height / 2
        const snap = 10 / currentScale

        if (Math.abs(cy - hy) < snap) {
          this.$alignH.style.cssText = `display:block;top:${hy}px;`
        } else this.$alignH.style.display = 'none'

        if (Math.abs(cx - hx) < snap) {
          this.$alignV.style.cssText = `display:block;left:${hx}px;`
        } else this.$alignV.style.display = 'none'
      }

      hideGuides() {
        this.$alignH.style.display = 'none'
        this.$alignV.style.display = 'none'
      }

      // ── 工具栏 ──────────────────────────────────────────────────
      _showToolbar(el) {
        const rect = el.getBoundingClientRect()
        const tb   = this.$toolbar
        tb.classList.add('visible')

        // 工具栏显示在元素上方居中；如果太靠顶，显示在下方
        const tbH = 42
        const margin = 8
        let top  = rect.top - tbH - margin
        let left = rect.left + rect.width / 2 - tb.offsetWidth / 2

        if (top < 40) top = rect.bottom + margin
        left = Math.max(8, Math.min(left, window.innerWidth - tb.offsetWidth - 8))

        tb.style.left = `${left}px`
        tb.style.top  = `${top}px`

        // 更新工具栏状态（reflect current styles）
        this._refreshToolbarState(el)
      }

      _refreshToolbarState(el) {
        const cs = window.getComputedStyle(el)
        // 字体大小
        const fsInput = document.getElementById('tb-font-size')
        fsInput.value = Math.round(parseFloat(cs.fontSize) || 16)
        // 文字颜色
        const color = cs.color || '#ffffff'
        document.getElementById('tb-color-preview').style.background = color
        document.getElementById('tb-color-input').value = this._rgbToHex(color)
        // 粗体/斜体/下划线
        document.getElementById('tb-bold').classList.toggle('active', parseInt(cs.fontWeight) >= 700)
        document.getElementById('tb-italic').classList.toggle('active', cs.fontStyle === 'italic')
        document.getElementById('tb-underline').classList.toggle('active', cs.textDecoration.includes('underline'))
        // 对齐
        const ta = cs.textAlign
        document.getElementById('tb-align-left').classList.toggle('active',   ta === 'left' || ta === 'start')
        document.getElementById('tb-align-center').classList.toggle('active', ta === 'center')
        document.getElementById('tb-align-right').classList.toggle('active',  ta === 'right' || ta === 'end')
      }

      _bindToolbar() {
        // 粗体
        document.getElementById('tb-bold').addEventListener('click', () => {
          if (!this._sel) return
          const cs = window.getComputedStyle(this._sel)
          const isBold = parseInt(cs.fontWeight) >= 700
          editManager.applyStyleProp(this._sel, 'font-weight', isBold ? 'normal' : 'bold')
          this._refreshToolbarState(this._sel)
        })

        // 斜体
        document.getElementById('tb-italic').addEventListener('click', () => {
          if (!this._sel) return
          const cs = window.getComputedStyle(this._sel)
          editManager.applyStyleProp(this._sel, 'font-style', cs.fontStyle === 'italic' ? 'normal' : 'italic')
          this._refreshToolbarState(this._sel)
        })

        // 下划线
        document.getElementById('tb-underline').addEventListener('click', () => {
          if (!this._sel) return
          const cs = window.getComputedStyle(this._sel)
          const has = cs.textDecoration.includes('underline')
          editManager.applyStyleProp(this._sel, 'text-decoration', has ? 'none' : 'underline')
          this._refreshToolbarState(this._sel)
        })

        // 字号（input change / enter）
        const fsInput = document.getElementById('tb-font-size')
        const applyFontSize = () => {
          if (!this._sel) return
          const v = parseInt(fsInput.value)
          if (v > 0) editManager.applyStyleProp(this._sel, 'font-size', `${v}px`)
        }
        fsInput.addEventListener('change', applyFontSize)
        fsInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); applyFontSize() } })

        // 文字颜色
        const colorInput = document.getElementById('tb-color-input')
        colorInput.addEventListener('input', () => {
          if (!this._sel) return
          const hex = colorInput.value
          document.getElementById('tb-color-preview').style.background = hex
          editManager.applyStyleProp(this._sel, 'color', hex)
        })

        // 对齐
        ;['left','center','right'].forEach(align => {
          document.getElementById(`tb-align-${align}`).addEventListener('click', () => {
            if (!this._sel) return
            editManager.applyStyleProp(this._sel, 'text-align', align)
            this._refreshToolbarState(this._sel)
          })
        })

        // 置于顶层
        document.getElementById('tb-bring-front').addEventListener('click', () => {
          if (!this._sel) return
          const cs = window.getComputedStyle(this._sel)
          const cur = parseInt(cs.zIndex) || 0
          editManager.applyStyleProp(this._sel, 'z-index', String(cur + 10))
        })

        // 删除元素
        document.getElementById('tb-delete').addEventListener('click', () => {
          if (!this._sel) return
          editManager.deleteElement(this._sel)
          this.clearSelection()
        })
      }

      // ── 工具函数 ────────────────────────────────────────────────
      _rgbToHex(rgb) {
        const m = rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/)
        if (!m) return '#ffffff'
        return '#' + [m[1],m[2],m[3]].map(n => parseInt(n).toString(16).padStart(2,'0')).join('')
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  PropsPanel — 右侧属性面板（宿主层）
    // ═══════════════════════════════════════════════════════════════
    const propsPanel = new class PropsPanel {
      constructor() {
        this.$panel  = document.getElementById('props-panel')
        this.$noSel  = document.getElementById('pp-no-selection')
        this.$content = document.getElementById('pp-content')
        this._el     = null
        this._ignore = false  // 防止循环更新

        this._bindInputs()
      }

      open()  { this.$panel.classList.add('visible') }
      close() { this.$panel.classList.remove('visible') }

      /** 用当前选中元素的样式更新面板 */
      update(el) {
        this._el = el
        this.$noSel.style.display  = 'none'
        this.$content.style.display = 'flex'

        const cs = window.getComputedStyle(el)
        const label = el.tagName.toLowerCase() + (el.id ? `#${el.id}` : el.className?.split(' ').find(c => c && !c.startsWith('tang-')) ? `.${el.className.split(' ').find(c => c && !c.startsWith('tang-'))}` : '')
        document.getElementById('pp-element-label').textContent = label

        // 位移 (transform translate)
        this._ignore = true
        const t = el.style.transform || ''
        const m = t.match(/translate\(([^,]+),\s*([^)]+)\)/)
        document.getElementById('pp-x').value = m ? Math.round(parseFloat(m[1])) : 0
        document.getElementById('pp-y').value = m ? Math.round(parseFloat(m[2])) : 0

        // 不透明度
        const op = parseFloat(cs.opacity ?? '1')
        document.getElementById('pp-opacity-range').value = op
        document.getElementById('pp-opacity-val').value   = Math.round(op * 100)

        // 背景色
        const bgRaw = cs.backgroundColor || 'transparent'
        const bgHex = bgRaw.startsWith('rgb') ? this._rgbToHex(bgRaw) : ''
        document.getElementById('pp-bg-swatch').style.background = bgRaw
        if (bgHex) document.getElementById('pp-bg-input').value = bgHex
        document.getElementById('pp-bg-hex').value = bgHex

        // 圆角
        const radius = parseInt(cs.borderRadius) || 0
        document.getElementById('pp-radius-range').value = Math.min(radius, 80)
        document.getElementById('pp-radius-val').value   = radius

        this._ignore = false
      }

      /** 清空面板（无选中） */
      clear() {
        this._el = null
        this.$noSel.style.display   = 'block'
        this.$content.style.display = 'none'
      }

      _bindInputs() {
        // 位移 X
        document.getElementById('pp-x').addEventListener('change', () => {
          if (!this._el || this._ignore) return
          const x = parseFloat(document.getElementById('pp-x').value) || 0
          const y = parseFloat(document.getElementById('pp-y').value) || 0
          this._applyMove(x, y)
        })
        document.getElementById('pp-y').addEventListener('change', () => {
          if (!this._el || this._ignore) return
          const x = parseFloat(document.getElementById('pp-x').value) || 0
          const y = parseFloat(document.getElementById('pp-y').value) || 0
          this._applyMove(x, y)
        })

        // 不透明度（range + number 联动）
        const opRange = document.getElementById('pp-opacity-range')
        const opVal   = document.getElementById('pp-opacity-val')
        opRange.addEventListener('input', () => {
          if (!this._el || this._ignore) return
          opVal.value = Math.round(opRange.value * 100)
          editManager.applyStyleProp(this._el, 'opacity', opRange.value)
        })
        opVal.addEventListener('change', () => {
          if (!this._el || this._ignore) return
          const v = Math.min(100, Math.max(0, parseInt(opVal.value) || 100)) / 100
          opRange.value = v
          editManager.applyStyleProp(this._el, 'opacity', String(v))
        })

        // 背景色
        const bgInput = document.getElementById('pp-bg-input')
        const bgHex   = document.getElementById('pp-bg-hex')
        bgInput.addEventListener('input', () => {
          if (!this._el || this._ignore) return
          bgHex.value = bgInput.value.toUpperCase()
          document.getElementById('pp-bg-swatch').style.background = bgInput.value
          editManager.applyStyleProp(this._el, 'background-color', bgInput.value)
        })
        bgHex.addEventListener('change', () => {
          if (!this._el || this._ignore) return
          const v = bgHex.value.trim()
          if (/^#[0-9a-fA-F]{3,8}$/.test(v)) {
            bgInput.value = v
            document.getElementById('pp-bg-swatch').style.background = v
            editManager.applyStyleProp(this._el, 'background-color', v)
          }
        })

        // 圆角
        const rrRange = document.getElementById('pp-radius-range')
        const rrVal   = document.getElementById('pp-radius-val')
        rrRange.addEventListener('input', () => {
          if (!this._el || this._ignore) return
          rrVal.value = rrRange.value
          editManager.applyStyleProp(this._el, 'border-radius', `${rrRange.value}px`)
        })
        rrVal.addEventListener('change', () => {
          if (!this._el || this._ignore) return
          rrRange.value = Math.min(80, Math.max(0, parseInt(rrVal.value) || 0))
          editManager.applyStyleProp(this._el, 'border-radius', `${rrRange.value}px`)
        })

        // 对齐按钮（相对 slide）
        document.getElementById('pp-align-left').addEventListener('click',    () => this._alignEl('left'))
        document.getElementById('pp-align-hcenter').addEventListener('click', () => this._alignEl('hcenter'))
        document.getElementById('pp-align-right').addEventListener('click',   () => this._alignEl('right'))
        document.getElementById('pp-align-top').addEventListener('click',     () => this._alignEl('top'))
        document.getElementById('pp-align-vcenter').addEventListener('click', () => this._alignEl('vcenter'))
        document.getElementById('pp-align-bottom').addEventListener('click',  () => this._alignEl('bottom'))
      }

      _applyMove(x, y) {
        const anchor = { type: 'selector', selector: `[data-tang-line="${this._el.dataset.tangLine}"]` }
        this._el.style.transform = `translate(${x}px, ${y}px)`
        const anch = { type: 'line', file: this._el.dataset.tangFile, line: parseInt(this._el.dataset.tangLine) }
        editManager.patches = editManager.patches?.filter(p => !(p.type === 'move')) ?? []
        // Use the public API
        editManager.applyStyleProp(this._el, 'transform', `translate(${x}px, ${y}px)`)
      }

      _alignEl(dir) {
        if (!this._el) return
        const el    = this._el
        const slide = slideStage.querySelector('.slide')
        if (!slide) return
        const sr = slide.getBoundingClientRect()
        const er = el.getBoundingClientRect()

        // 当前已有的 translate 基值
        const t = el.style.transform || ''
        const m = t.match(/translate\(([^,]+),\s*([^)]+)\)/)
        const bx = m ? parseFloat(m[1]) : 0
        const by = m ? parseFloat(m[2]) : 0

        let nx = bx, ny = by
        const scale = currentScale

        switch(dir) {
          case 'left':    nx = bx + (sr.left - er.left) / scale; break
          case 'right':   nx = bx + (sr.right - er.right) / scale; break
          case 'hcenter': nx = bx + (sr.left + sr.width/2 - er.left - er.width/2) / scale; break
          case 'top':     ny = by + (sr.top - er.top) / scale; break
          case 'bottom':  ny = by + (sr.bottom - er.bottom) / scale; break
          case 'vcenter': ny = by + (sr.top + sr.height/2 - er.top - er.height/2) / scale; break
        }

        nx = Math.round(nx); ny = Math.round(ny)
        document.getElementById('pp-x').value = nx
        document.getElementById('pp-y').value = ny
        el.style.transform = `translate(${nx}px, ${ny}px)`
        editManager.applyStyleProp(el, 'transform', `translate(${nx}px, ${ny}px)`)
        editUI.updateOverlay(el)
      }

      _rgbToHex(rgb) {
        const m = rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/)
        if (!m) return '#000000'
        return '#' + [m[1],m[2],m[3]].map(n => parseInt(n).toString(16).padStart(2,'0')).join('')
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  CodeBoxManager — CodeMirror 6 IDE 模式 + 代码运行
    // ═══════════════════════════════════════════════════════════════

    // 解码 HTML entities 工具（将 hljs 渲染后的文本还原为原始代码）
    function decodeEntities(str) {
      const ta = document.createElement('textarea')
      ta.innerHTML = str
      return ta.value
    }

    const codeBoxManager = new class CodeBoxManager {
      constructor() {
        this._cmModules = null  // 缓存已加载的 CodeMirror 模块
        this._editors   = []    // { container, view, outputEl }
      }

      /** 初始化当前 slide 内所有 [data-codebox="ide"] 容器 */
      async init() {
        const ideBoxes = slideStage.querySelectorAll('[data-codebox="ide"]:not([data-cm-init])')
        if (ideBoxes.length === 0) return
        const mods = await this._loadCM()
        if (!mods) return
        ideBoxes.forEach(box => this._initBox(box, mods))
      }

      /** 懒加载 CodeMirror 6 模块（esm.sh v135 pin，所有包共享同一个 state 实例） */
      async _loadCM() {
        if (this._cmModules) return this._cmModules
        try {
          // esm.sh v135 pin：所有包内部 import 都解析到 /v135/ 路径
          // 相同路径 => 浏览器模块缓存命中 => 只有一个 @codemirror/state 实例
          const PIN = 'https://esm.sh/v135'
          const [stateMod, viewMod, langMod, cmdMod, autoMod,
                 jsMod, htmlMod, cssMod, themeMod] = await Promise.all([
            import(`${PIN}/@codemirror/state@6.4.1`),
            import(`${PIN}/@codemirror/view@6.4.1`),
            import(`${PIN}/@codemirror/language@6.10.1`),
            import(`${PIN}/@codemirror/commands@6.6.0`),
            import(`${PIN}/@codemirror/autocomplete@6.18.0`),
            import(`${PIN}/@codemirror/lang-javascript@6.2.2`),
            import(`${PIN}/@codemirror/lang-html@6.4.9`),
            import(`${PIN}/@codemirror/lang-css@6.2.1`),
            import(`${PIN}/@codemirror/theme-one-dark@6.1.2`),
          ])
          this._cmModules = {
            EditorView:             viewMod.EditorView,
            keymap:                 viewMod.keymap,
            lineNumbers:            viewMod.lineNumbers,
            highlightActiveLine:    viewMod.highlightActiveLine,
            drawSelection:          viewMod.drawSelection,
            EditorState:            stateMod.EditorState,
            defaultKeymap:          cmdMod.defaultKeymap,
            indentWithTab:          cmdMod.indentWithTab,
            history:                cmdMod.history,
            historyKeymap:          cmdMod.historyKeymap,
            autocompletion:         autoMod.autocompletion,
            closeBrackets:          autoMod.closeBrackets,
            indentOnInput:          langMod.indentOnInput,
            syntaxHighlighting:     langMod.syntaxHighlighting,
            defaultHighlightStyle:  langMod.defaultHighlightStyle,
            bracketMatching:        langMod.bracketMatching,
            foldGutter:             langMod.foldGutter,
            javascript:             jsMod.javascript,
            html:                   htmlMod.html,
            css:                    cssMod.css,
            oneDark:                themeMod.oneDark,
          }
          return this._cmModules
        } catch (e) {
          console.error('[CodeBoxManager] 加载 CodeMirror 失败:', e)
          return null
        }
      }

      _getLangExtension(lang, mods) {
        switch ((lang || 'javascript').toLowerCase()) {
          case 'js': case 'javascript': return mods.javascript({ jsx: true })
          case 'html':                  return mods.html()
          case 'css':                   return mods.css()
          default:                      return mods.javascript()
        }
      }

      _initBox(box, mods) {
        box.dataset.cmInit = '1'
        const lang      = box.dataset.language || 'javascript'
        const canRun    = box.dataset.run === 'true'
        const heightPx  = parseInt(box.dataset.height || '300')
        const rawScript = box.querySelector('script[type="text/plain"]')
        const initCode  = rawScript ? rawScript.textContent.trim() : '// 在这里写代码'

        // 直接从 mods 解构（已平铺到顶层）
        const {
          EditorView, keymap, lineNumbers, highlightActiveLine, drawSelection,
          EditorState,
          defaultKeymap, indentWithTab, history, historyKeymap,
          autocompletion, closeBrackets,
          indentOnInput, syntaxHighlighting, defaultHighlightStyle,
          bracketMatching, foldGutter,
          oneDark,
        } = mods

        // ── 构建容器 DOM ──
        box.innerHTML = ''
        box.style.cssText = `
          display: flex; flex-direction: column;
          border-radius: 10px; overflow: hidden;
          border: 1px solid #21262d;
          height: ${heightPx}px;
          font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        `

        // 标题栏
        const titlebar = document.createElement('div')
        titlebar.style.cssText = `
          display: flex; align-items: center; gap: 6px;
          padding: 8px 14px; background: #161b22;
          border-bottom: 1px solid #21262d; flex-shrink: 0;
        `
        const dots = ['#ff5f56','#ffbd2e','#27c93f'].map(c => {
          const d = document.createElement('div')
          d.style.cssText = `width:10px;height:10px;border-radius:50%;background:${c};`
          return d
        })
        dots.forEach(d => titlebar.appendChild(d))
        const filenameSpan = document.createElement('span')
        filenameSpan.textContent = `  ${box.dataset.filename || lang + ' · IDE 模式'}`
        filenameSpan.style.cssText = 'font-size:12px;color:#8b949e;flex:1;'
        titlebar.appendChild(filenameSpan)

        if (canRun) {
          const runBtn = document.createElement('button')
          runBtn.textContent = '▶ Run'
          runBtn.style.cssText = `
            background: rgba(34,197,94,0.15); color: #4ade80;
            border: 1px solid rgba(34,197,94,0.3); border-radius: 5px;
            font-size: 11px; font-weight: 700; font-family: system-ui;
            padding: 3px 10px; cursor: pointer;
          `
          runBtn.addEventListener('mouseover', () => runBtn.style.background = 'rgba(34,197,94,0.25)')
          runBtn.addEventListener('mouseout',  () => runBtn.style.background = 'rgba(34,197,94,0.15)')
          runBtn.addEventListener('click', () => {
            const code = view.state.doc.toString()
            this._runCode(lang, code, outputEl)
          })
          titlebar.appendChild(runBtn)
        }
        box.appendChild(titlebar)

        // 编辑器容器
        const editorWrap = document.createElement('div')
        editorWrap.style.cssText = 'flex:1;overflow:hidden;position:relative;'
        box.appendChild(editorWrap)

        // 输出面板
        const outputEl = document.createElement('div')
        outputEl.style.cssText = `
          display: none;
          background: #0a0e14; border-top: 1px solid #21262d;
          font-family: ui-monospace; font-size: 11.5px; color: #a0aec0;
          padding: 8px 14px; max-height: 100px; overflow-y: auto;
          flex-shrink: 0; white-space: pre-wrap;
        `
        box.appendChild(outputEl)

        // ── 创建 EditorView ──
        const view = new EditorView({
          state: EditorState.create({
            doc: initCode,
            extensions: [
              lineNumbers(),
              highlightActiveLine(),
              drawSelection(),
              bracketMatching(),
              closeBrackets(),
              history(),
              indentOnInput(),
              syntaxHighlighting(defaultHighlightStyle),
              autocompletion(),
              foldGutter(),
              keymap.of([
                indentWithTab,
                ...defaultKeymap,
                ...historyKeymap,
              ]),
              this._getLangExtension(lang, mods),
              oneDark,
              EditorView.lineWrapping,
              EditorView.theme({
                '&': { height: '100%', fontSize: '12px' },
                '.cm-scroller': { overflow: 'auto', fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace' },
              }),
            ],
          }),
          parent: editorWrap,
        })

        box._cmEditor = view
        this._editors.push({ container: box, view, outputEl })
      }

      /** 在 iframe sandbox 里运行代码 */
      _runCode(lang, code, outputEl) {
        outputEl.style.display = 'block'
        outputEl.textContent = '▶ 运行中…'

        const iframe = document.createElement('iframe')
        iframe.style.display = 'none'
        iframe.setAttribute('sandbox', 'allow-scripts')

        const onMsg = (e) => {
          if (e.source !== iframe.contentWindow) return
          if (e.data?.type === 'run-result') {
            window.removeEventListener('message', onMsg)
            iframe.remove()
            const lines = e.data.output
            outputEl.textContent = lines.length
              ? lines.join('\n')
              : '(无输出)'
          }
        }
        window.addEventListener('message', onMsg)

        if (lang === 'html' || lang === 'css') {
          // HTML/CSS 直接预览
          outputEl.textContent = ''
          const preview = document.createElement('iframe')
          preview.style.cssText = 'width:100%;height:90px;border:none;background:#fff;'
          preview.setAttribute('sandbox', 'allow-scripts')
          preview.srcdoc = lang === 'css' ? `<style>${code}</style><div style="padding:8px;font-size:12px">CSS 预览</div>` : code
          outputEl.appendChild(preview)
          iframe.remove()
          window.removeEventListener('message', onMsg)
          return
        }

        // JavaScript 执行
        const escaped = code.replace(/<\/script>/gi, '<\\/script>')
        iframe.srcdoc = `<!DOCTYPE html><script>
  ;(function(){
    const _out = []
    const _orig = console.log.bind(console)
    console.log = (...a) => { _out.push(a.map(x => typeof x === 'object' ? JSON.stringify(x) : String(x)).join(' ')); _orig(...a) }
    console.error = (...a) => { _out.push('❌ ' + a.join(' ')); _orig(...a) }
    console.warn  = (...a) => { _out.push('⚠️ ' + a.join(' ')); _orig(...a) }
    try { ${escaped} } catch(e) { _out.push('❌ ' + e.message) }
    parent.postMessage({ type: 'run-result', output: _out }, '*')
  })()
<\/script>`
        document.body.appendChild(iframe)
      }

      /** 清理所有 editor 实例（切页时调用） */
      destroy() {
        this._editors.forEach(({ view }) => view.destroy())
        this._editors = []
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // 导航事件
    // ═══════════════════════════════════════════════════════════════
    document.getElementById('btn-prev').addEventListener('click', () => navigateTo(current - 1))
    document.getElementById('btn-next').addEventListener('click', () => navigateTo(current + 1))
    document.getElementById('btn-edit').addEventListener('click', () => editManager.enable())
    document.getElementById('btn-save').addEventListener('click', () => editManager.save())
    document.getElementById('btn-cancel-edit').addEventListener('click', () => editManager.disable())

    document.addEventListener('keydown', e => {
      if (editManager.active) {
        if (e.key === 'Escape') { editManager.disable(); return }
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); editManager.save(); return }
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); editManager.undo(); return }
        return  // 编辑模式下屏蔽翻页快捷键
      }
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); navigateTo(current + 1) }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); navigateTo(current - 1) }
      if (e.key === 'Home')       navigateTo(0)
      if (e.key === 'End')        navigateTo(CONFIG.totalSlides - 1)
      if (e.key === 'e' || e.key === 'E') editManager.enable()
      if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.()
    })

    let touchStartX = 0
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0]?.clientX ?? 0 }, { passive: true })
    document.addEventListener('touchend', e => {
      if (editManager.active) return
      const diff = touchStartX - (e.changedTouches[0]?.clientX ?? 0)
      if (Math.abs(diff) > 50) diff > 0 ? navigateTo(current + 1) : navigateTo(current - 1)
    })

    // ─── Vite HMR ────────────────────────────────────────────────────
    if (import.meta.hot) {
      import.meta.hot.on('tang-slide-update', ({ file }) => {
        const match = file.match(/slide-(\d+)\.html$/)
        if (!match) return
        const idx = parseInt(match[1], 10) - 1
        if (idx === current) {
          navigateTo(current, { hmrReload: true }).then(() => {
            showToast('🔥 slide 已热更新', 'info')
          })
        }
      })
    }

    // ─── 仅在 dev 模式（有 HMR）时显示编辑按钮 ─────────────────────
    if (!import.meta.hot) {
      document.getElementById('btn-edit').style.display  = 'none'
      document.querySelector('.nav-divider').style.display = 'none'
    }

    window.__slideRunner = {
      navigateTo: (i) => navigateTo(i),
      get current() { return current },
      total: CONFIG.totalSlides,
    }

    // ─── 初始化 ───────────────────────────────────────────────────────
    const startIndex = parseInt(location.hash.slice(1)) || 0
    await navigateTo(startIndex, { instant: true })
    document.getElementById('loading').classList.add('hidden')
  </script>
</body>
</html>
