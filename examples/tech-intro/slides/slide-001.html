<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <style>
      .slide {
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: linear-gradient(135deg, #7c3aed 0%, #1e1b4b 60%, #0f172a 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 80px 100px;
        position: relative;
      }
      #particle-canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      #cursor-glow {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.18) 0%, transparent 70%);
        transform: translate(-50%, -50%);
        pointer-events: none;
        transition: opacity 0.3s;
        opacity: 0;
      }
      .deco-grid {
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 64px 64px;
        pointer-events: none;
      }
      .deco-circle-1 {
        position: absolute;
        right: -60px;
        top: -60px;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.06);
        pointer-events: none;
      }
      .deco-circle-2 {
        position: absolute;
        right: 100px;
        bottom: -100px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: rgba(124, 58, 237, 0.15);
        pointer-events: none;
      }
      /* 右侧竖排装饰线 */
      .deco-vline {
        position: absolute;
        right: 380px;
        top: 0;
        bottom: 0;
        width: 1px;
        background: linear-gradient(to bottom, transparent, rgba(124, 58, 237, 0.3) 30%, rgba(124, 58, 237, 0.3) 70%, transparent);
        pointer-events: none;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(124, 58, 237, 0.3);
        border: 1px solid rgba(124, 58, 237, 0.5);
        color: #c4b5fd;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 6px 16px;
        border-radius: 999px;
        margin-bottom: 32px;
        position: relative;
      }
      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #a78bfa;
        box-shadow: 0 0 8px #a78bfa;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 4px #a78bfa;
        }
        50% {
          box-shadow:
            0 0 14px #a78bfa,
            0 0 28px rgba(167, 139, 250, 0.4);
        }
      }
      .title {
        font-size: 72px;
        font-weight: 800;
        color: #fff;
        line-height: 1.05;
        letter-spacing: -0.03em;
        margin-bottom: 16px;
        position: relative;
      }
      .title-accent {
        color: #a78bfa;
        background: linear-gradient(90deg, #a78bfa, #7c3aed, #c4b5fd, #a78bfa);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 4s linear infinite;
      }
      @keyframes shimmer {
        to {
          background-position: 200% center;
        }
      }
      .subtitle {
        font-size: 21px;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 400;
        max-width: 560px;
        line-height: 1.65;
        position: relative;
      }
      .meta {
        display: flex;
        align-items: center;
        gap: 28px;
        margin-top: 44px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.35);
        position: relative;
      }
      .meta-divider {
        width: 1px;
        height: 14px;
        background: rgba(255, 255, 255, 0.2);
      }

      /* 右下角特性标签 */
      .feature-tags {
        position: absolute;
        right: 96px;
        bottom: 76px;
        display: flex;
        flex-direction: column;
        gap: 9px;
        align-items: flex-end;
      }
      .ftag {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.65);
        font-weight: 500;
        transition:
          background 0.2s,
          border-color 0.2s;
      }
      .ftag:hover {
        background: rgba(124, 58, 237, 0.15);
        border-color: rgba(124, 58, 237, 0.4);
      }
      .ftag-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .ftag.new {
        border-color: rgba(124, 58, 237, 0.4);
        color: #c4b5fd;
        background: rgba(124, 58, 237, 0.12);
      }

      /* 右侧动画说明卡 */
      .anim-legend {
        position: absolute;
        right: 96px;
        top: 80px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: flex-end;
      }
      .anim-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .anim-pill.page {
        background: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.3);
        color: #93c5fd;
      }
      .anim-pill.el {
        background: rgba(16, 185, 129, 0.12);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: #6ee7b7;
      }
      .anim-pill-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
      }

      /* 步骤动画指示器 */
      .step-hint {
        position: absolute;
        bottom: 28px;
        left: 100px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.25);
      }
      .step-arrow {
        font-size: 14px;
        animation: bounceX 1.5s ease-in-out infinite;
      }
      @keyframes bounceX {
        0%,
        100% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(4px);
        }
      }
    </style>
  </head>
  <body>
    <div class="slide" data-slide-id="001" data-slide-type="cover" data-load-animation="zoom-out">
      <canvas id="particle-canvas"></canvas>
      <div id="cursor-glow"></div>
      <div class="deco-grid"></div>
      <div class="deco-vline"></div>
      <div class="deco-circle-1"></div>
      <div class="deco-circle-2"></div>

      <!-- 页面级动画：badge + title，onLoad 控制入场 -->
      <div class="badge">
        <span class="badge-dot"></span>
        开源项目介绍 · v0.3
      </div>

      <h1 class="title">
        tang-
        <span class="title-accent">slidex.js</span>
      </h1>

      <!-- 右上角动画类型说明（onLoad 入场） -->
      <div class="anim-legend">
        <div class="anim-pill page">
          <span class="anim-pill-dot" style="background: #60a5fa"></span>
          页面级动画
        </div>
        <div class="anim-pill el">
          <span class="anim-pill-dot" style="background: #34d399"></span>
          元素级动画
        </div>
      </div>

      <!-- 元素级：step 1 — 副标题 -->
      <p class="subtitle" data-step-1="1" data-animation-1="fade-up" data-duration-1="550" data-delay-1="0">
        首个专为 AI Agent 设计、前端技术栈原生的开源幻灯片框架
        <br />
        —— 现已支持完整三层动画系统
      </p>

      <!-- 元素级：step 1 — meta 信息（与 subtitle 同步） -->
      <div class="meta" data-step-1="1" data-animation-1="fade-up" data-duration-1="450" data-delay-1="100">
        <span>jiaoxinheng</span>
        <div class="meta-divider"></div>
        <span>2026</span>
        <div class="meta-divider"></div>
        <span>tang-slidex v0.3</span>
      </div>

      <!-- 元素级：step 2 — 特性标签逐条出现 -->
      <div class="feature-tags">
        <div class="ftag new" data-step-1="2" data-animation-1="fade-left" data-duration-1="380">
          <span class="ftag-dot" style="background: #f59e0b"></span>
          ✨ 三层动画系统
        </div>
        <div class="ftag new" data-step-1="2" data-animation-1="fade-left" data-duration-1="380" data-delay-1="60">
          <span class="ftag-dot" style="background: #a78bfa"></span>
          GSAP 驱动 · 可视化配置
        </div>
        <div class="ftag new" data-step-1="2" data-animation-1="fade-left" data-duration-1="380" data-delay-1="120">
          <span class="ftag-dot" style="background: #34d399"></span>
          data-step-1 协议
        </div>
        <div class="ftag" data-step-1="2" data-animation-1="fade-left" data-duration-1="380" data-delay-1="180">
          <span class="ftag-dot" style="background: #60a5fa"></span>
          React WYSIWYG 编辑器
        </div>
        <div class="ftag" data-step-1="2" data-animation-1="fade-left" data-duration-1="380" data-delay-1="240">
          <span class="ftag-dot" style="background: #94a3b8"></span>
          AI Agent 原生 · HTML/CSS/JS
        </div>
      </div>

      <!-- 步骤提示 -->
      <div class="step-hint" data-step-1="1" data-animation-1="fade" data-duration-1="600" data-delay-1="400">
        <span>按 → 查看下一步</span>
        <span class="step-arrow">→</span>
      </div>
    </div>

    <script>
      // ── 粒子背景 ─────────────────────────────────────────────────────────────
      const canvas = document.getElementById("particle-canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = 1280;
      canvas.height = 720;

      const particles = [];
      for (let i = 0; i < 80; i++) {
        particles.push({
          x: Math.random() * 1280,
          y: Math.random() * 720,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          alpha: Math.random() * 0.5 + 0.1,
        });
      }
      function drawParticles() {
        ctx.clearRect(0, 0, 1280, 720);
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(167,139,250,${p.alpha})`;
          ctx.fill();
        }
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x,
              dy = particles[i].y - particles[j].y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 140) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(124,58,237,${(1 - d / 140) * 0.12})`;
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
        }
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > 1280) p.vx *= -1;
          if (p.y < 0 || p.y > 720) p.vy *= -1;
        }
        requestAnimationFrame(drawParticles);
      }
      drawParticles();

      // 鼠标光晕
      const glow = document.getElementById("cursor-glow");
      const slide = document.querySelector(".slide");
      slide.addEventListener("mousemove", (e) => {
        const rect = slide.getBoundingClientRect();
        glow.style.left = (e.clientX - rect.left) * (1280 / rect.width) + "px";
        glow.style.top = (e.clientY - rect.top) * (720 / rect.height) + "px";
        glow.style.opacity = "1";
        for (const p of particles) {
          const dx = parseFloat(glow.style.left) - p.x,
            dy = parseFloat(glow.style.top) - p.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 180) {
            p.vx += (dx / d) * 0.06;
            p.vy += (dy / d) * 0.06;
            const s = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
            if (s > 1.5) {
              p.vx = (p.vx / s) * 1.5;
              p.vy = (p.vy / s) * 1.5;
            }
          }
        }
      });
      slide.addEventListener("mouseleave", () => {
        glow.style.opacity = "0";
      });

      // ── 页面级动画（onLoad）：badge、title、deco-circle、anim-legend ──────────
      if (window.gsap) {
        tang.onLoad(() => {
          // deco 装饰最早进入
          gsap.from(".deco-circle-1", { scale: 0.6, opacity: 0, duration: 1.4, delay: 0, ease: "power2.out" });
          // badge 从上方落下
          gsap.from(".badge", { y: -28, opacity: 0, duration: 0.5, delay: 0.1, ease: "back.out(1.5)" });
          // title 大字冲入
          gsap.from(".title", { y: 40, opacity: 0, duration: 0.7, delay: 0.25, ease: "power3.out" });
          // 右上角类型标签依次出现
          gsap.from(".anim-pill", { x: 24, opacity: 0, duration: 0.4, stagger: 0.12, delay: 0.4, ease: "power2.out" });
        });
      }
    </script>
  </body>
</html>
