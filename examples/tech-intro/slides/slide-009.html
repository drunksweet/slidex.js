<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    .slide {
      width: 1280px; height: 720px; overflow: hidden;
      background-color: var(--color-background, #0f172a);
      padding: 44px 64px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;
    }
    .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--color-primary, #7c3aed); margin-bottom: 12px; }
    .title   { font-size: 38px; font-weight: 800; color: var(--color-text, #f1f5f9); line-height: 1.2; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: var(--color-text-muted, #94a3b8); margin-bottom: 0; }
    .left-top { grid-column: 1; grid-row: 1; }
    #chart-bar { width: 100%; height: 280px; }
    #chart-line { width: 100%; height: 260px; }
    .chart-box {
      background: var(--color-surface, #1e293b);
      border: 1px solid var(--color-border, #334155);
      border-radius: 10px; padding: 16px;
    }
    .chart-label { font-size: 13px; font-weight: 600; color: var(--color-text-muted, #94a3b8); margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="slide" data-slide-id="009" data-slide-type="content">
    <div style="grid-column:1/3;">
      <p class="eyebrow">06 · 能力展示</p>
      <h1 class="title">数据可视化能力</h1>
      <p class="subtitle">ECharts 5 原生集成 · 主题自适应 · 动态数据 · 交互式图表</p>
    </div>
    <div class="chart-box">
      <div class="chart-label">📊 月活用户增长（万）</div>
      <div id="chart-bar"></div>
    </div>
    <div class="chart-box">
      <div class="chart-label">📈 框架使用趋势对比</div>
      <div id="chart-line"></div>
    </div>
  </div>
  <script>
    if (typeof echarts !== 'undefined') {
      const bar = echarts.init(document.getElementById('chart-bar'))
      bar.setOption({
        backgroundColor: 'transparent',
        grid: { left: 40, right: 16, top: 16, bottom: 30 },
        xAxis: {
          type: 'category',
          data: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
          axisLine: { lineStyle: { color: '#334155' } },
          axisLabel: { color: '#64748b', fontSize: 11 },
        },
        yAxis: {
          type: 'value',
          axisLine: { show: false },
          splitLine: { lineStyle: { color: '#1e293b' } },
          axisLabel: { color: '#64748b', fontSize: 11 },
        },
        series: [{
          type: 'bar',
          data: [2.1, 3.8, 5.2, 7.1, 9.4, 12.3, 15.8, 19.2, 23.5, 28.1, 34.0, 41.2],
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#7c3aed' },
              { offset: 1, color: '#5b21b6' },
            ]),
            borderRadius: [4, 4, 0, 0],
          },
          showBackground: true,
          backgroundStyle: { color: 'rgba(124,58,237,0.06)', borderRadius: [4,4,0,0] },
        }],
        tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#f1f5f9', fontSize: 12 } },
      })

      const line = echarts.init(document.getElementById('chart-line'))
      line.setOption({
        backgroundColor: 'transparent',
        grid: { left: 40, right: 40, top: 16, bottom: 30 },
        legend: { top: -4, right: 0, textStyle: { color: '#94a3b8', fontSize: 11 } },
        xAxis: {
          type: 'category',
          data: ['Q1','Q2','Q3','Q4','Q1\'27'],
          axisLine: { lineStyle: { color: '#334155' } },
          axisLabel: { color: '#64748b', fontSize: 11 },
        },
        yAxis: {
          type: 'value',
          axisLine: { show: false },
          splitLine: { lineStyle: { color: '#1e293b' } },
          axisLabel: { color: '#64748b', fontSize: 11 },
        },
        series: [
          { name: 'tang-slidex', type: 'line', smooth: true, symbol: 'circle', symbolSize: 6, data: [0, 12, 45, 130, 280], lineStyle: { color: '#7c3aed', width: 2.5 }, itemStyle: { color: '#7c3aed' }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(124,58,237,0.25)' }, { offset: 1, color: 'rgba(124,58,237,0)' }]) } },
          { name: 'Slidev', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5, data: [80, 90, 95, 100, 105], lineStyle: { color: '#2563eb', width: 2 }, itemStyle: { color: '#2563eb' } },
          { name: 'reveal.js', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5, data: [60, 62, 63, 64, 64], lineStyle: { color: '#64748b', width: 2 }, itemStyle: { color: '#64748b' } },
        ],
        tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#f1f5f9', fontSize: 12 } },
      })
    }
    if (window.gsap) {
      gsap.from('.title',     { y: -20, opacity: 0, duration: 0.4 })
      gsap.from('.chart-box', { y: 30, opacity: 0, duration: 0.45, stagger: 0.12, delay: 0.2 })
    }
  </script>
</body>
</html>
